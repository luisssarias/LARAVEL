<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios | Compra Fácil</title>
    <link rel="stylesheet" href="css/usuarios.css">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div>
                <h2>Módulo Usuario</h2>
                <p class="subtitle">Listado de usuarios registrados</p>
        </div>

        <div class="topbar-actions">
            <a class="btn" href="/dashboard.html">Volver</a>
            <a class="btn btn-primary" href="/usuarios-form.html">Nuevo Usuario</a>
            <button id="logoutBtn" class="btn btn-danger" type="button">Cerrar Sesión</button>
        </div>
    </div>

    <section class="card">
        <div class="card-body">
            <div class="toolbar">
               <input id="search" class="input" type="text" placeholder="Buscar por nombre o correo...">
               <button id="refreshBtn" class="btn">Actualizar</button>
            </div>

            <p id="status" class="status">Cargando...</p>

            <div class="table-wrap">
                <table id="table" class="userstable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Rol</th>
                            <th>Departamento</th>
                            <th style="width:190px;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        <script src="js/usuarios.js"></script>
</body>
</html>
